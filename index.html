<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Copy Enterprises - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Prevent horizontal bounce on mobile */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        #root {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
        }

        @media print {
            .no-print {
                display: none !important;
            }
        }

        /* Increase input font size to prevent iOS auto-zoom */
        input, select, textarea {
            font-size: 16px !important;
        }

        /* Improve touch responsiveness */
        button, a {
            touch-action: manipulation;
        }

        /* Custom scrollbar styling for a consistent professional look */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 5px;
            border: 2px solid #0f172a;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Firefox scrollbar support */
        * {
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
    </style>

        "react-dom/": "https://esm.sh/react-dom@18.3.1/",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.463.0?external=react",
        "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom",
        "jspdf": "https://esm.sh/jspdf@2.5.2",
        "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2"
      }
    }
    </script>
</head>

    <div id="root"></div>

</body>
</html>
